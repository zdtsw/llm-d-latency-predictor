name: CI - Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: prediction-server
            dockerfile: prediction/Dockerfile
          - name: training-server
            dockerfile: training/Dockerfile
          - name: test
            dockerfile: tests/Dockerfile
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set project name from repository
        id: meta
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          echo "project_name=$repo" >> "$GITHUB_OUTPUT"
          echo "image_name=$repo-${{ matrix.service.name }}" >> "$GITHUB_OUTPUT"

      - name: Determine tag
        id: tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag="${GITHUB_REF##refs/tags/}"
            prerelease="${{ github.event.release.prerelease }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF##refs/tags/}"
            # Semver pre-releases (v1.2.3-rc.1) contain '-'; never tag them 'latest'.
            [[ "$tag" == *-* ]] && prerelease=true || prerelease=false
          else
            tag="latest"
            prerelease=false
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build and push
        uses: ./.github/actions/docker-build-and-push
        with:
          image-name: ${{ steps.meta.outputs.image_name }}
          tag: ${{ steps.tag.outputs.tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          dockerfile: ${{ matrix.service.dockerfile }}

      - name: Trivy security scan
        uses: ./.github/actions/trivy-scan
        with:
          image: ghcr.io/llm-d/${{ steps.meta.outputs.image_name }}:${{ steps.tag.outputs.tag }}
