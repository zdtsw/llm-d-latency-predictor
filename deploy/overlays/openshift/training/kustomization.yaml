apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# OpenShift adjustments for the training component.
patches:
  - path: deployment.yaml              # drop GKE nodeSelector + restricted-v2 securityContext
  - path: pvc.yaml                     # use the cluster default StorageClass
  - path: delete-storageclass.yaml     # remove the GKE-only hyperdisk StorageClass
  - path: delete-external-service.yaml  # remove the external LoadBalancer, we dont make a new Router for this in ocp unless it is needed
